version: '3.9'

services:
  backend:
    build: ./backend
    container_name: moderation-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MOCK_AI=${MOCK_AI}
      - NODE_ENV=production
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: moderation-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads_data:
